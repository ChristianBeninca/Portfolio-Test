<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pessoal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            padding-top: 44px;
        }

        .portfolio-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            background: rgba(15, 15, 35, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0 1.5rem;
            height: 44px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .portfolio-nav a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: color 0.2s;
        }

        .portfolio-nav a:hover {
            color: #667eea;
        }

        .portfolio-nav__divider {
            color: #666;
            font-size: 0.75rem;
        }

        .portfolio-nav__label {
            color: #8888aa;
            font-size: 0.8rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInUp 0.8s ease-out;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .datetime {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }

        .search-container {
            margin-bottom: 3rem;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .search-box {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            placeholder-color: rgba(255, 255, 255, 0.7);
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-input:focus {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
            background: rgba(255, 255, 255, 0.25);
        }

        .dashboards-container {
            display: flex;
            gap: 2rem;
            overflow-x: auto;
            padding-bottom: 2rem;
            min-height: 400px;
        }

        .dashboard-column {
            min-width: 320px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            animation: fadeInUp 0.8s ease-out calc(0.4s + var(--delay)) both;
            position: relative;
        }

        .dashboard-column:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .column-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .column-title.editing {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            min-width: 150px;
            border: none;
            color: white;
            outline: none;
        }

        .column-menu {
            position: relative;
        }

        .menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 0.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            z-index: 1000;
            min-width: 150px;
            display: none;
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            display: block;
            width: 100%;
            padding: 0.8rem;
            background: none;
            border: none;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            color: #333;
            font-size: 14px;
        }

        .dropdown-item:hover {
            background: rgba(0,0,0,0.1);
        }

        .site-links {
            display: grid;
            gap: 0.8rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .site-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            cursor: pointer;
        }

        .site-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }

        .site-info {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .site-icon {
            width: 24px;
            height: 24px;
            margin-right: 0.8rem;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .site-name {
            font-weight: 500;
        }

        .site-actions {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .site-link:hover .site-actions {
            opacity: 1;
        }

        .delete-site {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            padding: 0.2rem;
            border-radius: 4px;
            font-size: 16px;
        }

        .delete-site:hover {
            background: rgba(255, 107, 107, 0.2);
        }

        .add-site-btn {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            margin-top: 1rem;
        }

        .add-site-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .add-dashboard-btn {
            min-width: 320px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            font-size: 18px;
            flex-shrink: 0;
        }

        .add-dashboard-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-5px);
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        .shape:nth-child(1) { width: 80px; height: 80px; left: 10%; animation-delay: 0s; }
        .shape:nth-child(2) { width: 60px; height: 60px; left: 80%; animation-delay: 5s; }
        .shape:nth-child(3) { width: 100px; height: 100px; left: 60%; animation-delay: 10s; }
        .shape:nth-child(4) { width: 40px; height: 40px; left: 30%; animation-delay: 15s; }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .weather {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            min-width: 120px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            color: #333;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #333;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #555;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-input:focus {
            border-color: #667eea;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd8;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .header h1 { font-size: 2rem; }
            .dashboards-container { flex-direction: column; }
            .weather { position: static; margin: 1rem auto; }
        }
    </style>
</head>
<body>
    <nav class="portfolio-nav">
        <a href="../../index.html">&larr; Portfolio</a>
        <span class="portfolio-nav__divider">|</span>
        <span class="portfolio-nav__label">Dashboard Pessoal</span>
    </nav>
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="weather">
        <div id="weather-info">
            <div>🌤️</div>
            <div>22°C</div>
        </div>
    </div>

    <div class="container">
        <header class="header">
            <h1>Meus Dashboards</h1>
            <div class="datetime" id="datetime"></div>
        </header>

        <div class="search-container">
            <div class="search-box">
                <input type="text" class="search-input" placeholder="Pesquisar no Google..." id="searchInput">
            </div>
        </div>

        <div class="dashboards-container" id="dashboardsContainer">
            <!-- Os dashboards serão carregados aqui dinamicamente -->
        </div>
    </div>

    <!-- Modal para adicionar sites -->
    <div class="modal" id="siteModal">
        <div class="modal-content">
            <h2 class="modal-title">Adicionar Site</h2>
            <div>
                <div class="form-group">
                    <label class="form-label">Nome do Site</label>
                    <input type="text" class="form-input" id="siteName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">URL</label>
                    <input type="url" class="form-input" id="siteUrl" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Ícone (emoji)</label>
                    <input type="text" class="form-input" id="siteIcon" placeholder="🌐" maxlength="2">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeSiteModal()">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="addSite()">Adicionar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para adicionar dashboard -->
    <div class="modal" id="dashboardModal">
        <div class="modal-content">
            <h2 class="modal-title">Novo Dashboard</h2>
            <div>
                <div class="form-group">
                    <label class="form-label">Nome do Dashboard</label>
                    <input type="text" class="form-input" id="dashboardName" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeDashboardModal()">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="addDashboard()">Criar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Variáveis globais
        let dashboards = [];
        let currentDashboardId = null;

        // Dados exemplo inicial
        const defaultDashboards = [
            {
                id: 'exemplo',
                name: '📱 Redes Sociais',
                sites: [
                    { name: 'YouTube', url: 'https://youtube.com', icon: '🎥' },
                    { name: 'Instagram', url: 'https://instagram.com', icon: '📷' },
                    { name: 'Twitter', url: 'https://twitter.com', icon: '🐦' },
                    { name: 'TikTok', url: 'https://tiktok.com', icon: '🎵' }
                ]
            }
        ];

        // Inicialização
        function init() {
            loadDashboards();
            setupEventListeners();
            updateDateTime();
            updateWeather();
            renderDashboards();
            
            // Atualizar a cada minuto
            setInterval(updateDateTime, 60000);
            setInterval(updateWeather, 600000);
        }

        // Carregar dashboards do localStorage
        function loadDashboards() {
            const saved = localStorage.getItem('personalDashboards');
            if (saved) {
                dashboards = JSON.parse(saved);
            } else {
                dashboards = defaultDashboards;
                saveDashboards();
            }
        }

        // Salvar dashboards no localStorage
        function saveDashboards() {
            localStorage.setItem('personalDashboards', JSON.stringify(dashboards));
        }

        // Renderizar dashboards
        function renderDashboards() {
            const container = document.getElementById('dashboardsContainer');
            container.innerHTML = '';

            dashboards.forEach((dashboard, index) => {
                const dashboardElement = createDashboardElement(dashboard, index);
                container.appendChild(dashboardElement);
            });

            // Botão para adicionar novo dashboard
            const addBtn = document.createElement('div');
            addBtn.className = 'add-dashboard-btn';
            addBtn.innerHTML = '+ Novo Dashboard';
            addBtn.onclick = openDashboardModal;
            container.appendChild(addBtn);
        }

        // Criar elemento de dashboard
        function createDashboardElement(dashboard, index) {
            const div = document.createElement('div');
            div.className = 'dashboard-column';
            div.style.setProperty('--delay', `${index * 0.1}s`);

            div.innerHTML = `
                <div class="column-header">
                    <h2 class="column-title" onclick="editDashboardName('${dashboard.id}')">${dashboard.name}</h2>
                    <div class="column-menu">
                        <button class="menu-btn" onclick="toggleMenu('${dashboard.id}')">⋮</button>
                        <div class="dropdown-menu" id="menu-${dashboard.id}">
                            <button class="dropdown-item" onclick="editDashboardName('${dashboard.id}')">✏️ Renomear</button>
                            <button class="dropdown-item" onclick="deleteDashboard('${dashboard.id}')">🗑️ Excluir</button>
                        </div>
                    </div>
                </div>
                <div class="site-links" id="sites-${dashboard.id}">
                    ${dashboard.sites.map(site => createSiteElement(site, dashboard.id)).join('')}
                </div>
                <button class="add-site-btn" onclick="openSiteModal('${dashboard.id}')">+ Adicionar Site</button>
            `;

            return div;
        }

        // Criar elemento de site
        function createSiteElement(site, dashboardId) {
            return `
                <a href="${site.url}" class="site-link" target="_blank">
                    <div class="site-info">
                        <div class="site-icon">${site.icon}</div>
                        <span class="site-name">${site.name}</span>
                    </div>
                    <div class="site-actions">
                        <button class="delete-site" onclick="deleteSite('${dashboardId}', '${site.name}', event)">×</button>
                    </div>
                </a>
            `;
        }

        // Abrir modal de site
        function openSiteModal(dashboardId) {
            currentDashboardId = dashboardId;
            document.getElementById('siteModal').classList.add('show');
            document.getElementById('siteName').focus();
        }

        // Fechar modal de site
        function closeSiteModal() {
            document.getElementById('siteModal').classList.remove('show');
            document.getElementById('siteName').value = '';
            document.getElementById('siteUrl').value = '';
            document.getElementById('siteIcon').value = '';
            currentDashboardId = null;
        }

        // Abrir modal de dashboard
        function openDashboardModal() {
            document.getElementById('dashboardModal').classList.add('show');
            document.getElementById('dashboardName').focus();
        }

        // Fechar modal de dashboard
        function closeDashboardModal() {
            document.getElementById('dashboardModal').classList.remove('show');
            document.getElementById('dashboardName').value = '';
        }

        // Adicionar novo site
        function addSite() {
            const name = document.getElementById('siteName').value.trim();
            const url = document.getElementById('siteUrl').value.trim();
            const icon = document.getElementById('siteIcon').value.trim() || '🌐';

            if (!name || !url) {
                alert('Por favor, preencha o nome e a URL do site.');
                return;
            }

            const dashboard = dashboards.find(d => d.id === currentDashboardId);
            if (dashboard) {
                dashboard.sites.push({ name, url, icon });
                saveDashboards();
                renderDashboards();
                closeSiteModal();
            }
        }

        // Adicionar novo dashboard
        function addDashboard() {
            const name = document.getElementById('dashboardName').value.trim();
            
            if (!name) {
                alert('Por favor, digite um nome para o dashboard.');
                return;
            }

            const id = name.toLowerCase().replace(/\s+/g, '-') + '-' + Date.now();

            dashboards.push({
                id,
                name,
                sites: []
            });

            saveDashboards();
            renderDashboards();
            closeDashboardModal();
        }

        // Excluir site
        function deleteSite(dashboardId, siteName, event) {
            event.preventDefault();
            event.stopPropagation();
            
            if (confirm(`Excluir "${siteName}"?`)) {
                const dashboard = dashboards.find(d => d.id === dashboardId);
                if (dashboard) {
                    dashboard.sites = dashboard.sites.filter(s => s.name !== siteName);
                    saveDashboards();
                    renderDashboards();
                }
            }
        }

        // Excluir dashboard
        function deleteDashboard(dashboardId) {
            const dashboard = dashboards.find(d => d.id === dashboardId);
            if (dashboard && confirm(`Excluir dashboard "${dashboard.name}"?`)) {
                dashboards = dashboards.filter(d => d.id !== dashboardId);
                saveDashboards();
                renderDashboards();
            }
            closeAllMenus();
        }

        // Editar nome do dashboard
        function editDashboardName(dashboardId) {
            const dashboard = dashboards.find(d => d.id === dashboardId);
            if (!dashboard) return;

            const newName = prompt('Nome do dashboard:', dashboard.name);
            if (newName && newName.trim() !== dashboard.name) {
                dashboard.name = newName.trim();
                saveDashboards();
                renderDashboards();
            }
            closeAllMenus();
        }

        // Toggle menu dropdown
        function toggleMenu(dashboardId) {
            closeAllMenus();
            const menu = document.getElementById(`menu-${dashboardId}`);
            if (menu) {
                menu.classList.toggle('show');
            }
        }

        // Fechar todos os menus
        function closeAllMenus() {
            document.querySelectorAll('.dropdown-menu').forEach(menu => {
                menu.classList.remove('show');
            });
        }

        // Event listeners
        function setupEventListeners() {
            // Search
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const query = encodeURIComponent(this.value);
                    if (query) {
                        window.open(`https://www.google.com/search?q=${query}`, '_blank');
                        this.value = '';
                    }
                }
            });

            // Fechar modals clicando fora
            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', function(e) {
                    if (e.target === this) {
                        this.classList.remove('show');
                    }
                });
            });

            // Fechar menus clicando fora
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.column-menu')) {
                    closeAllMenus();
                }
            });

            // Atalhos de teclado
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey && e.key === 'k') || e.key === '/') {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
                if (e.key === 'Escape') {
                    closeSiteModal();
                    closeDashboardModal();
                    closeAllMenus();
                }
                
                // Enter nos campos de input para adicionar
                if (e.key === 'Enter') {
                    const activeModal = document.querySelector('.modal.show');
                    if (activeModal) {
                        if (activeModal.id === 'siteModal') {
                            addSite();
                        } else if (activeModal.id === 'dashboardModal') {
                            addDashboard();
                        }
                    }
                }
            });
        }

        // Atualizar data/hora
        function updateDateTime() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            document.getElementById('datetime').textContent = now.toLocaleDateString('pt-BR', options);
        }

        // Simulação de clima
        function updateWeather() {
            const weather = ['🌞', '⛅', '🌤️', '🌦️', '⛈️'];
            const temps = ['18°C', '22°C', '25°C', '19°C', '16°C'];
            
            const randomWeather = weather[Math.floor(Math.random() * weather.length)];
            const randomTemp = temps[Math.floor(Math.random() * temps.length)];
            
            document.getElementById('weather-info').innerHTML = `
                <div>${randomWeather}</div>
                <div>${randomTemp}</div>
            `;
        }

        // Inicializar quando a página carregar
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
